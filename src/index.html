<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Somniation — IT Services &amp; Technology Consulting</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Somniation is a full-service IT partner: managed IT support, cloud solutions, cybersecurity, custom software, consulting and data analytics.">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <script>
    // Set the theme before first paint to avoid a flash of the wrong theme.
    (function () {
      try {
        var t = localStorage.getItem('somniation-theme');
        if (t !== 'light' && t !== 'dark') {
          t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        document.documentElement.setAttribute('data-theme', t);
      } catch (e) { /* default to light */ }
    })();
  </script>
</head>
<body>
  <app-root></app-root>
</body>
</html>
